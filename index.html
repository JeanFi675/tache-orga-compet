<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logistique - France Escalade Jeunes</title>
  </head>
  <body>
    <!-- GATEKEEPER VIEW -->
    <div id="login-view" class="container">
      <div class="login-card">
        <h1>Championnat France Escalade Jeunes</h1>
        <form id="login-form">
          <input
            type="password"
            id="login-password"
            class="input-brutal"
            placeholder="Mot de passe"
            required
          />
          <button
            type="submit"
            class="btn-brutal"
            style="
              margin-top: 1.5rem;
              width: 100%;
              background-color: var(--color-ice);
            "
          >
            Entrer
          </button>
        </form>
        <div
          id="login-error"
          style="color: red; font-weight: bold; margin-top: 1rem"
          class="hidden"
        >
          Mot de passe incorrect
        </div>
      </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="container hidden">
      <div id="dashboard-header">
        <h1>Missions Logistiques</h1>
        <div class="counter-brutal" id="progress-counter">0 / 0 Terminées</div>
      </div>

      <div class="filters-container">
        <select id="filter-referent" class="select-brutal">
          <option value="ALL">Tous les référents</option>
          <!-- Loaded dynamically -->
        </select>
        <select id="filter-status" class="select-brutal">
          <option value="ALL">Tous les statuts</option>
          <option value="INCOMPLETE">À faire</option>
          <option value="COMPLETED">Terminées</option>
        </select>
      </div>

      <div id="missions-container">
        <!-- Missions Cards will be injected here -->
      </div>
    </div>

    <!-- ADD TASK MODAL -->
    <div id="add-task-modal" class="brutal-modal hidden">
      <div class="brutal-modal-content">
        <h2>Nouvelle Tâche</h2>
        <input type="text" id="new-task-title" class="input-brutal" placeholder="Titre de la tâche" />
        <input type="hidden" id="new-task-mission-id" />
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
          <button id="btn-save-task" class="btn-brutal" style="flex:1;">Ajouter</button>
          <button id="btn-cancel-task" class="btn-brutal" style="flex:1; background-color: var(--color-ice);">Annuler</button>
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
