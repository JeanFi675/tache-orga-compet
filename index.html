<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organisation Compétition</title>
    <!-- Fonts: Space Grotesk for body, Inter for titles -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Note-Orga</h1>
      <button id="btn-edit" class="brutal-btn">Éditer le contenu</button>
    </header>

    <div class="layout">
      <main class="content-container">
        <div id="content-display" class="markdown-body">
          <p>Chargement de l'organisation...</p>
        </div>
        <div id="editor-container" class="hidden">
          <textarea id="markdown-editor" spellcheck="false"></textarea>
          <div class="editor-actions">
            <button id="btn-save" class="brutal-btn primary">
              Sauvegarder
            </button>
            <button id="btn-cancel" class="brutal-btn">Annuler</button>
          </div>
        </div>
      </main>

      <aside class="sidebar">
        <div class="tags-container">
          <h3>Personnes / Tags</h3>
          <div id="tags-list">
            <!-- Tags will be injected here -->
          </div>
        </div>
      </aside>
    </div>

    <!-- Password Modal -->
    <dialog id="password-modal" class="brutal-dialog">
      <h2>Accès Édition</h2>
      <p>Entrez le mot de passe pour modifier l'organisation.</p>
      <input
        type="password"
        id="password-input"
        class="brutal-input"
        placeholder="Mot de passe"
      />
      <div class="dialog-actions">
        <button id="btn-modal-cancel" class="brutal-btn">Fermer</button>
        <button id="btn-modal-submit" class="brutal-btn primary">
          Valider
        </button>
      </div>
    </dialog>

    <script type="module" src="/main.js"></script>
  </body>
</html>
