<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logistique - France Escalade Jeunes</title>
    <!-- Quill Rich Text Editor CSS -->
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- GATEKEEPER VIEW -->
    <div id="login-view" class="container">
      <div class="login-card">
        <h1>Championnat France Escalade Jeunes</h1>
        <form id="login-form">
          <input
            type="password"
            id="login-password"
            class="input-brutal"
            placeholder="Mot de passe"
            required
          />
          <button
            type="submit"
            class="btn-brutal"
            style="
              margin-top: 1.5rem;
              width: 100%;
              background-color: var(--color-ice);
            "
          >
            Entrer
          </button>
        </form>
        <div
          id="login-error"
          style="color: red; font-weight: bold; margin-top: 1rem"
          class="hidden"
        >
          Mot de passe incorrect
        </div>
      </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="container hidden">
      <div
        id="dashboard-header"
        style="
          align-items: center;
          justify-content: space-between;
          display: flex;
          flex-wrap: wrap;
          gap: 0.5rem;
        "
      >
        <div style="display: flex; align-items: center; gap: 1rem">
          <img
            src="logo-championnat-france-2026.svg"
            alt="Championnat de France 2026"
            class="logo-header"
          />
          <a
            href="archive.html"
            class="btn-brutal"
            style="
              font-size: 0.8rem;
              padding: 0.3rem 0.8rem;
              background-color: var(--color-ice);
              text-decoration: none;
              color: black;
            "
            >Voir les Archives</a
          >
          <button
            id="btn-export-json"
            class="btn-brutal"
            style="
              font-size: 0.8rem;
              padding: 0.3rem 0.8rem;
              background-color: var(--color-ice);
            "
            title="Exporter toutes les données en JSON"
            >Export JSON</button
          >
        </div>
        <div class="counter-brutal" id="progress-counter">0 / 0 Terminées</div>
      </div>

      <div class="filters-container">
        <select id="filter-referent" class="select-brutal">
          <option value="ALL">Référent</option>
          <!-- Loaded dynamically -->
        </select>
        <select id="filter-status" class="select-brutal">
          <option value="ALL">Statut</option>
          <option value="INCOMPLETE">À faire</option>
          <option value="COMPLETED">Terminées</option>
        </select>
        <select id="filter-phase" class="select-brutal">
          <option value="ALL">Phase</option>
          <!-- Loaded dynamically -->
        </select>
        <select id="filter-pole" class="select-brutal">
          <option value="ALL">Pôle</option>
          <!-- Loaded dynamically -->
        </select>
      </div>

      <div id="missions-container">
        <!-- Missions Cards will be injected here -->
      </div>

      <button
        id="btn-open-add-mission"
        class="btn-fab"
        title="Nouvelle Mission"
      >
        +
      </button>
    </div>

    <!-- ADD TASK MODAL -->
    <div id="add-task-modal" class="brutal-modal hidden">
      <div class="brutal-modal-content">
        <h2 id="task-modal-title">Nouvelle Tâche</h2>

        <div>
          <label
            for="new-task-title"
            style="display: block; font-weight: bold; margin-bottom: 0.2rem"
            >Titre de la tâche</label
          >
          <input
            type="text"
            id="new-task-title"
            class="input-brutal"
            placeholder="Ex: Acheter du pain"
          />
        </div>

        <div>
          <label
            for="new-task-referent-id"
            style="display: block; font-weight: bold; margin-bottom: 0.2rem"
            >Référent assigné</label
          >
          <select
            id="new-task-referent-id"
            class="select-brutal"
            style="width: 100%"
          >
            <option value="">Non assigné</option>
            <!-- Loaded dynamically -->
          </select>
        </div>

        <input type="hidden" id="new-task-mission-id" />

        <div style="display: flex; gap: 1rem">
          <button id="btn-save-task" class="btn-brutal" style="flex: 1">
            Ajouter
          </button>
          <button
            id="btn-cancel-task"
            class="btn-brutal"
            style="flex: 1; background-color: var(--color-ice)"
          >
            Annuler
          </button>
        </div>
      </div>
    </div>

    <!-- ADD MISSION MODAL -->
    <div id="add-mission-modal" class="brutal-modal hidden">
      <div class="brutal-modal-content">
        <h2 id="mission-modal-title">Nouvelle Mission</h2>
        <input
          type="text"
          id="new-mission-title"
          class="input-brutal"
          placeholder="Titre de la mission"
        />

        <div
          style="
            margin-top: 1rem;
            border: 2px solid var(--color-dark);
            padding: 0.5rem;
            background-color: var(--color-light);
          "
        >
          <label
            style="display: block; font-weight: bold; margin-bottom: 0.5rem"
            >Type de mission</label
          >
          <div style="display: flex; gap: 1rem">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 0.3rem;
                cursor: pointer;
              "
            >
              <input
                type="radio"
                name="mission-type"
                value="taches"
                checked
                style="
                  width: 1.2rem;
                  height: 1.2rem;
                  appearance: auto;
                  border: 2px solid var(--color-dark);
                "
              />
              Liste de tâches
            </label>
            <label
              style="
                display: flex;
                align-items: center;
                gap: 0.3rem;
                cursor: pointer;
              "
            >
              <input
                type="radio"
                name="mission-type"
                value="fiche"
                style="
                  width: 1.2rem;
                  height: 1.2rem;
                  appearance: auto;
                  border: 2px solid var(--color-dark);
                "
              />
              Fiche textuelle
            </label>
          </div>
        </div>

        <div style="margin-top: 1rem">
          <label
            for="new-mission-date"
            id="lbl-mission-date"
            style="display: block; font-weight: bold; margin-bottom: 0.2rem"
            >Date</label
          >
          <input
            type="date"
            id="new-mission-date"
            class="input-brutal"
            style="width: 100%"
          />
        </div>
        <div id="time-inputs-container" style="display: flex; gap: 1rem; margin-top: 1rem">
          <div style="flex: 1">
            <label
              for="new-mission-time-debut"
              style="display: block; font-weight: bold; margin-bottom: 0.2rem"
              >Heure début</label
            >
            <input
              type="time"
              id="new-mission-time-debut"
              class="input-brutal"
              style="width: 100%"
            />
          </div>
          <div style="flex: 1">
            <label
              for="new-mission-time-fin"
              style="display: block; font-weight: bold; margin-bottom: 0.2rem"
              >Heure fin</label
            >
            <input
              type="time"
              id="new-mission-time-fin"
              class="input-brutal"
              style="width: 100%"
            />
          </div>
        </div>
        <div style="margin-top: 1rem">
          <label
            for="mission-phase-select"
            style="display: block; font-weight: bold; margin-bottom: 0.2rem"
            >Phase</label
          >
          <div style="display: flex; gap: 0.5rem">
            <select
              id="mission-phase-select"
              class="select-brutal"
              style="flex: 1"
            >
              <option value="">-- Sélectionner ou ajouter --</option>
              <!-- Loaded dynamically -->
            </select>
            <input
              type="text"
              id="new-phase-input"
              class="input-brutal"
              placeholder="Nouvelle phase..."
              style="flex: 1; display: none"
            />
            <button
              id="btn-toggle-new-phase"
              class="btn-brutal"
              style="padding: 0 0.5rem"
              title="Ajouter une nouvelle phase"
            >
              +
            </button>
          </div>
        </div>
        <div style="margin-top: 1rem">
          <label
            for="mission-pole-select"
            style="display: block; font-weight: bold; margin-bottom: 0.2rem"
            >Pôle</label
          >
          <div style="display: flex; gap: 0.5rem">
            <select
              id="mission-pole-select"
              class="select-brutal"
              style="flex: 1"
            >
              <option value="">-- Sélectionner ou ajouter --</option>
              <!-- Loaded dynamically -->
            </select>
            <input
              type="text"
              id="new-pole-input"
              class="input-brutal"
              placeholder="Nouveau pôle..."
              style="flex: 1; display: none"
            />
            <button
              id="btn-toggle-new-pole"
              class="btn-brutal"
              style="padding: 0 0.5rem"
              title="Ajouter un nouveau pôle"
            >
              +
            </button>
          </div>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem">
          <button id="btn-save-mission" class="btn-brutal" style="flex: 1">
            Ajouter
          </button>
          <button
            id="btn-cancel-mission"
            class="btn-brutal"
            style="flex: 1; background-color: var(--color-ice)"
          >
            Annuler
          </button>
        </div>
      </div>
    </div>

    <!-- ASSIGN MISSION MODAL -->
    <div id="assign-mission-modal" class="brutal-modal hidden">
      <div class="brutal-modal-content">
        <h2>Gérer l'équipe</h2>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem">
          <input
            type="text"
            id="new-referent-name"
            class="input-brutal"
            placeholder="Nouveau référent (ex: Alice)"
            style="flex: 1; margin: 0; font-size: 0.9rem"
          />
          <button
            id="btn-add-referent"
            class="btn-brutal"
            style="padding: 0.5rem 1rem"
          >
            Ajouter
          </button>
        </div>
        <div
          id="assign-mission-list"
          style="
            margin: 1rem 0;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
          "
        >
          <!-- Loaded dynamically -->
        </div>
        <input type="hidden" id="assign-mission-id" />
        <div style="display: flex; gap: 1rem; margin-top: 1rem">
          <button
            id="btn-close-assign-mission"
            class="btn-brutal"
            style="flex: 1; background-color: var(--color-ice)"
          >
            Fermer
          </button>
        </div>
      </div>
    </div>

    <!-- FICHE TASK MODAL -->
    <div id="fiche-task-modal" class="brutal-modal hidden">
      <div class="brutal-modal-content" style="max-width: 800px; width: 90%">
        <h2>Fiche de la tâche</h2>
        <div style="margin-top: 1rem">
          <div
            id="task-fiche-content"
            class="input-brutal"
            style="
              width: 100%;
              min-height: 200px;
              max-height: 60vh;
              overflow-y: auto;
              margin: 0;
              padding: 1rem;
              line-height: 1.5;
              background-color: var(--color-light);
              white-space: pre-wrap;
              font-size: 0.85rem;
            "
          ></div>
        </div>
        <input type="hidden" id="fiche-task-id" />
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem">
          <button
            id="btn-cancel-fiche"
            class="btn-brutal"
            style="flex: 1; background-color: var(--color-ice)"
          >
            Fermer
          </button>
        </div>
      </div>
    </div>

    <!-- FICHE MISSION EDIT MODAL -->
    <div id="edit-mission-fiche-modal" class="brutal-modal hidden">
      <div class="brutal-modal-content" style="max-width: 800px; width: 90%;">
        <h2>Modifier la fiche</h2>
        <div style="margin-top: 1rem; border: 2px solid var(--color-dark); background-color: var(--color-light);">
          <!-- Quill Editor Container -->
          <div id="quill-editor" style="height: 300px; font-size: 0.9rem;"></div>
        </div>
        <input type="hidden" id="edit-mission-fiche-id" />
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem">
          <button id="btn-save-mission-fiche" class="btn-brutal" style="flex: 1">
            Enregistrer
          </button>
          <button
            id="btn-cancel-mission-fiche"
            class="btn-brutal"
            style="flex: 1; background-color: var(--color-ice)"
          >
            Annuler
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Quill Rich Text Editor JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
