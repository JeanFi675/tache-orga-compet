<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Archives - Logistique</title>
  </head>
  <body>
    <div id="login-view" class="container">
      <div class="login-card">
        <h1>Archives Logistique</h1>
        <form id="login-form">
          <input type="password" id="login-password" class="input-brutal" placeholder="Mot de passe" required />
          <button type="submit" class="btn-brutal" style="margin-top: 1.5rem; width: 100%; background-color: var(--color-ice);">Entrer</button>
        </form>
        <div id="login-error" style="color: red; font-weight: bold; margin-top: 1rem" class="hidden">Mot de passe incorrect</div>
      </div>
    </div>

    <div id="archive-view" class="container hidden">
      <div id="dashboard-header" style="align-items: center; justify-content: space-between; display: flex;">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <img src="logo-championnat-france-2026.svg" alt="Championnat de France 2026" class="logo-header" />
          <a href="index.html" class="btn-brutal" style="font-size: 0.8rem; padding: 0.3rem 0.8rem; background-color: var(--color-ice); text-decoration: none; color: black;">Retour au Dashboard</a>
        </div>
        <div style="font-family: 'Unbounded', sans-serif; font-weight: 900; background: #FFD700; padding: 0.5rem 1rem; border: 4px solid black; box-shadow: 4px 4px 0 black; text-transform: uppercase;">Mode Archives (Lecture Seule)</div>
      </div>

      <div class="filters-container">
        <select id="filter-referent" class="select-brutal">
          <option value="ALL">Référent</option>
        </select>
        <select id="filter-date" class="select-brutal">
          <option value="">Date / Heure</option>
        </select>
      </div>

      <div id="missions-container">
        <!-- Missions Cards will be injected here -->
      </div>
    </div>

    <script type="module" src="./archive.js"></script>
  </body>
</html>
